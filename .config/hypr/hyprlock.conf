# ==========================================
# HYPRLOCK - ULTRA MODERN CONFIG
# ==========================================

# BACKGROUND - خلفية نظيفة وحديثة
background {
  monitor =
  path = screenshot
  blur_passes = 5
  contrast = 1.08
  brightness = 0.84        
  vibrancy = 0.35          
  vibrancy_darkness = 0.3
}

# GENERAL
general {
    no_fade_in = false
    no_fade_out = false
    hide_cursor = true
    grace = 0
    disable_loading_bar = true
    ignore_empty_input = true
    text_trim = true
}

# ==========================================
# INPUT FIELD - GLASSMORPHISM MODERN
# ==========================================

input-field {
    monitor =
    size = 300, 48
    outline_thickness = 0
    dots_size = 0.18
    dots_spacing = 0.28
    dots_center = true
    
    # Glassmorphism - شفافية عصرية مع ألوان ناعمة
    outer_color = rgba(88, 86, 214, 0.12)
    inner_color = rgba(88, 86, 214, 0.06)
    font_color = rgb(205, 214, 244)
    
    fade_on_empty = true
    rounding = 10
    placeholder_text = <span foreground="##a6adc8" font_family="Noto Sans Arabic">كلمة المرور</span>
    hide_input = true
    
    position = 0, -180
    halign = center
    valign = center
    
    # Error handling - بسيط
    check_color = rgb(108, 112, 134)
    fail_color = rgb(243, 139, 168)
    fail_text = <b>$ATTEMPTS</b>
    fail_timeout = 1800
    fail_transition = 200
    
    # Shadow خفيف جداً
    shadow_passes = 0
}

# ==========================================
# TIME & DATE - MAIN DISPLAY
# ==========================================

# TIME - الساعة الكبيرة والعصرية
label {
  monitor = 
  text = cmd[update:1000] echo "$(date +" %I:%M %p")"
  color = rgb(205, 214, 244)
  font_size = 135
  font_family = Noto Sans Arabic Black
  position = 0, 30
  halign = center
  valign = center
  shadow_passes = 0
}

# DATE - اليوم
label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%a, %e %b %Y")"
  color = rgb(166, 173, 200)
  font_size = 16
  font_family = Noto Sans Arabic
  position = 0, 260
  halign = center
  valign = center
  shadow_passes = 0
}

# ==========================================
# FOOTER INDICATORS
# ==========================================

label {
  monitor =
  text = 
  color = rgb(148, 226, 213)
  font_size = 11
  font_family = Noto Sans Arabic
  position = 0, -20
  halign = center
  valign = bottom
  shadow_passes = 0
}
